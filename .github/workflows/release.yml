name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          BUILD_FLAGS="-ldflags=-s -w"

          # macOS
          GOOS=darwin GOARCH=amd64  go build $BUILD_FLAGS -o dist/skill-editor-darwin-amd64 .
          GOOS=darwin GOARCH=arm64  go build $BUILD_FLAGS -o dist/skill-editor-darwin-arm64 .

          # Linux
          GOOS=linux GOARCH=amd64   go build $BUILD_FLAGS -o dist/skill-editor-linux-amd64 .
          GOOS=linux GOARCH=arm64   go build $BUILD_FLAGS -o dist/skill-editor-linux-arm64 .

          # Windows (just in case)
          GOOS=windows GOARCH=amd64 go build $BUILD_FLAGS -o dist/skill-editor-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
